description: Microchip MCP23S17 SPI 16-bit I/O expander

compatible: "microchip,mcp23s17"

include: [gpio-controller.yaml, spi-device.yaml]

properties:
  reset-gpios:
    type: phandle-array
    description: Reset GPIO pin (active low)
  int-gpios:
    type: phandle-array
    description: Interrupt GPIO pin(s)

gpio-cells:
  - pin
  - flags
